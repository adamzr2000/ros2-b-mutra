# docker-compose.attestation.yml
# AUTO-GENERATED for 4 robot(s) — edit generate_compose.py, not this file.

services:
  robot1-sidecar:
    container_name: robot1-sidecar
    image: attestation-sidecar:latest
    environment:
      - CONFIG_PATH=/config/robot1.json
      - EXPORT_RESULTS=${EXPORT_RESULTS}
      - RESULTS_DIR=${RESULTS_DIR}
      - USE_REDIS=${USE_REDIS}
      - ONE_SHOT=${ONE_SHOT}
      - AUTO_START=${AUTO_START}
      - WAIT_FOR_TX_CONFIRMATIONS=${WAIT_FOR_TX_CONFIRMATIONS}
      - WAIT_FOR_VERIFICATION_RESULT=${WAIT_FOR_VERIFICATION_RESULT}
      - MEMORY_STORAGE_FILE=/measurements/robot1_measurements.json
      - ATTESTATION_INTERVAL_MS=${ATTESTATION_INTERVAL_MS}
      - ITERQ_THRESHOLD=${ITERQ_THRESHOLD}
      - EVENT_CONFIRMATIONS=${EVENT_CONFIRMATIONS}
      - EVENT_POLL_INTERVAL=${EVENT_POLL_INTERVAL}
      - EVENT_BATCH_SIZE=${EVENT_BATCH_SIZE}
      - LOG_LEVEL=${LOG_LEVEL}
      - ENABLE_LIBS_HASH=${ENABLE_LIBS_HASH}
      - SELF_INTEGRITY_ENABLED=${SELF_INTEGRITY_ENABLED}
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./config/robot1.json:/config/robot1.json
      - ./experiments/data/:/experiments/data:rw
      - /var/run/docker.sock:/var/run/docker.sock
      - ./measurements/:/measurements:rw
      - ./checkpoints/robot1-sidecar:/checkpoints
    pid: "container:robot1"
    cap_add:
      - SYS_PTRACE
    extra_hosts:
      - "host.docker.internal:host-gateway"


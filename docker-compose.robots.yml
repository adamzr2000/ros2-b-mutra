# docker-compose.robots.yml
# AUTO-GENERATED for 10 robot(s) — edit generate_compose.py, not this file.

services:
  gazebo-server:
    image: turtlebot3-gazebo
    container_name: gazebo-server
    hostname: gazebo-server
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - GAZEBO_AUDIO_DEVICE=none
    ports:
      - "11345:11345"
    tty: true
    stdin_open: true
    command: bash -c "./start_gazebo_server.sh"
    networks:
      - ros-net

  gazebo-client:
    image: gazebo-vnc:latest
    container_name: gazebo-client
    hostname: gazebo-client
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - GAZEBO_MASTER_URI=http://gazebo-server:11345
    depends_on:
      - gazebo-server
    ports:
      - "6080:80"
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped
    networks:
      - ros-net

  robot1:
    image: turtlebot3-gazebo
    container_name: robot1
    hostname: robot1
    environment:
        - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
        - GAZEBO_MASTER_URI=http://gazebo-server:11345
        - NAMESPACE=robot1
        - X_POSE=0
        - Y_POSE=0
    command: bash -c "./start_turtlebot.sh"
    depends_on:
      - gazebo-server
    stdin_open: true
    tty: true
    networks:
      - ros-net


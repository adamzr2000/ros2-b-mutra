# docker-compose.robots.yml
# AUTO-GENERATED for 4 robot(s) [Gazebo mode] — edit generate_compose.py, not this file.

services:
  gazebo-server:
    image: turtlebot3-gazebo
    container_name: gazebo-server
    hostname: gazebo-server
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - GAZEBO_AUDIO_DEVICE=none
    ports:
      - "11345:11345"
    tty: true
    stdin_open: true
    command: bash -c "./start_gazebo_server.sh"
    networks:
      - ros-net

  robot1:
    image: turtlebot3-gazebo
    container_name: robot1
    hostname: robot1
    environment:
        - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
        - GAZEBO_MASTER_URI=http://gazebo-server:11345
        - NAMESPACE=robot1
        - X_POSE=0
        - Y_POSE=0
    command: bash -c "./start_turtlebot.sh"
    depends_on:
      - gazebo-server
    stdin_open: true
    tty: true
    networks:
      - ros-net

  robot2:
    image: turtlebot3-gazebo
    container_name: robot2
    hostname: robot2
    environment:
        - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
        - GAZEBO_MASTER_URI=http://gazebo-server:11345
        - NAMESPACE=robot2
        - X_POSE=5
        - Y_POSE=0
    command: bash -c "./start_turtlebot.sh"
    depends_on:
      - gazebo-server
    stdin_open: true
    tty: true
    networks:
      - ros-net

  robot3:
    image: turtlebot3-gazebo
    container_name: robot3
    hostname: robot3
    environment:
        - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
        - GAZEBO_MASTER_URI=http://gazebo-server:11345
        - NAMESPACE=robot3
        - X_POSE=10
        - Y_POSE=0
    command: bash -c "./start_turtlebot.sh"
    depends_on:
      - gazebo-server
    stdin_open: true
    tty: true
    networks:
      - ros-net

  robot4:
    image: turtlebot3-gazebo
    container_name: robot4
    hostname: robot4
    environment:
        - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
        - GAZEBO_MASTER_URI=http://gazebo-server:11345
        - NAMESPACE=robot4
        - X_POSE=15
        - Y_POSE=0
    command: bash -c "./start_turtlebot.sh"
    depends_on:
      - gazebo-server
    stdin_open: true
    tty: true
    networks:
      - ros-net

networks:
  ros-net:
    driver: bridge
    name: ros-net

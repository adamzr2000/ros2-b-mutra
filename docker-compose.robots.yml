# docker-compose.robots.yml
# AUTO-GENERATED for 16 robot(s) [Gazebo mode] — edit generate_compose.py, not this file.

services:
  gazebo-server:
    image: turtlebot3-gazebo
    container_name: gazebo-server
    hostname: gazebo-server
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - GAZEBO_AUDIO_DEVICE=none
      - GAZEBO_WORLD=${GAZEBO_WORLD:-empty}
    ports:
      - "127.0.0.1:11345:11345"
    tty: true
    stdin_open: true
    command: bash -c "./start_gazebo_server.sh"
    networks:
      - ros-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  robot1:
    image: turtlebot3-gazebo
    container_name: robot1
    hostname: robot1
    environment:
        - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
        - GAZEBO_MASTER_URI=http://gazebo-server:11345
        - NAMESPACE=robot1
        - X_POSE=-1.5
        - Y_POSE=1.5
        - NAV2_MAP=map.yaml
        - ENABLE_NAV2=${ENABLE_NAV2:-false}
        - ENABLE_FORMATION=${ENABLE_FORMATION:-false}
        - FORMATION_SCALE=${FORMATION_SCALE:-2.0}
        - K_ATT=${K_ATT:-0.8}
        - K_FORM=${K_FORM:-3.0}
    command: bash -c "./start_turtlebot.sh"
    depends_on:
      - gazebo-server
    stdin_open: true
    tty: true
    networks:
      - ros-net

